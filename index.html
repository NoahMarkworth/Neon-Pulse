<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pulse - Rhythm Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            max-height: 800px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .hud-item {
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            font-size: 24px;
            font-weight: bold;
        }

        #combo {
            text-align: center;
            font-size: 36px;
        }

        #combo.multiplier-2 { color: #0f0; text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
        #combo.multiplier-3 { color: #ff0; text-shadow: 0 0 10px #ff0, 0 0 20px #ff0; }
        #combo.multiplier-4 { color: #f0f; text-shadow: 0 0 10px #f0f, 0 0 20px #f0f; }

        #health {
            display: flex;
            gap: 10px;
        }

        .heart {
            width: 30px;
            height: 30px;
            background: #f0f;
            clip-path: path('M15,26 C5,20 0,12 0,8 C0,3 4,0 8,0 C11,0 14,2 15,5 C16,2 19,0 22,0 C26,0 30,3 30,8 C30,12 25,20 15,26 Z');
            box-shadow: 0 0 10px #f0f;
            transition: all 0.3s;
        }

        .heart.empty {
            background: #333;
            box-shadow: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 18, 0.9);
            z-index: 20;
            transition: opacity 0.3s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #title {
            font-size: 72px;
            color: #f0f;
            text-shadow: 0 0 20px #f0f, 0 0 40px #f0f, 0 0 60px #0ff;
            margin-bottom: 20px;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 20px #f0f, 0 0 40px #f0f; }
            to { transform: scale(1.02); text-shadow: 0 0 30px #f0f, 0 0 60px #f0f, 0 0 80px #0ff; }
        }

        #subtitle {
            font-size: 24px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            margin-bottom: 40px;
        }

        #startPrompt {
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 10px #fff;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #highScore {
            font-size: 20px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-top: 30px;
        }

        #gameOverStats {
            text-align: center;
            color: #0ff;
            margin-bottom: 20px;
        }

        #gameOverStats h2 {
            font-size: 48px;
            color: #f0f;
            text-shadow: 0 0 20px #f0f;
            margin-bottom: 20px;
        }

        #gameOverStats p {
            font-size: 24px;
            margin: 10px 0;
            text-shadow: 0 0 10px #0ff;
        }

        .grade {
            font-size: 72px !important;
            font-weight: bold;
        }

        .grade-s { color: #f0f !important; }
        .grade-a { color: #0ff !important; }
        .grade-b { color: #0f0 !important; }
        .grade-c { color: #ff0 !important; }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            text-align: center;
        }

        #timingFeedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 15;
            transition: all 0.1s;
        }

        #timingFeedback.perfect {
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700;
        }

        #timingFeedback.good {
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
        }

        #timingFeedback.miss {
            color: #f00;
            text-shadow: 0 0 20px #f00;
        }

        #muteBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            z-index: 30;
            transition: all 0.3s;
        }

        #muteBtn:hover {
            background: #0ff;
            color: #0a0a12;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="hud">
            <div class="hud-item" id="score">0</div>
            <div class="hud-item" id="combo">1x</div>
            <div id="health">
                <div class="heart"></div>
                <div class="heart"></div>
                <div class="heart"></div>
            </div>
        </div>

        <div id="timingFeedback"></div>

        <div id="overlay">
            <div id="title">NEON PULSE</div>
            <div id="subtitle">RHYTHM RUNNER</div>
            <div id="startPrompt">PRESS SPACE TO START</div>
            <div id="highScore">HIGH SCORE: 0</div>
            <div id="gameOverStats" style="display: none;"></div>
        </div>

        <button id="muteBtn">SOUND</button>
        <div id="instructions">SPACE: Jump | Double-tap for double jump | M: Mute</div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game constants
        const BPM = 128;
        const BEAT_INTERVAL = 60000 / BPM;
        const PERFECT_WINDOW = 100;
        const GOOD_WINDOW = 180;
        const GROUND_HEIGHT = 100;
        const GRAVITY = 1.2;
        const JUMP_FORCE = -17;
        const DOUBLE_JUMP_FORCE = -15;
        const BASE_SPEED = 6;
        const MIN_OBSTACLE_SPACING = 280;
        const HIT_ZONE_X = 200;

        // Colors
        const COLORS = {
            bg: '#0a0a12',
            cyan: '#00ffff',
            magenta: '#ff00ff',
            yellow: '#ffff00',
            green: '#00ff00',
            white: '#ffffff',
            red: '#ff0044',
            orange: '#ff8800',
            gold: '#ffd700'
        };

        // Audio context
        let audioCtx = null;
        let isMuted = false;
        let masterGain = null;

        // Game state
        let gameState = 'title';
        let score = 0;
        let combo = 0;
        let multiplier = 1;
        let bestCombo = 0;
        let health = 3;
        let gameTime = 0;
        let lastBeatTime = 0;
        let beatCount = 0;
        let speed = BASE_SPEED;
        let perfectCount = 0;
        let goodCount = 0;
        let missCount = 0;

        // Pattern system for variety
        let currentPattern = 0;
        let patternBeat = 0;
        const PATTERNS = [
            [1, 0, 1, 0],           // Basic: beat 1 and 3
            [1, 0, 0, 1],           // Syncopated: beat 1 and 4
            [1, 1, 0, 0],           // Double: beats 1-2
            [1, 0, 1, 1],           // Triple: 1, 3, 4
            [0, 1, 0, 1],           // Off-beat: 2 and 4
            [1, 0, 0, 0, 1, 0, 1, 0], // Extended pattern
        ];

        // Player
        const player = {
            x: HIT_ZONE_X,
            y: 0,
            vy: 0,
            width: 40,
            height: 50,
            onGround: true,
            hasDoubleJumped: false,
            rotation: 0,
            targetRotation: 0,
            squash: 1,
            stretch: 1,
            trail: [],
            jumpSquatTime: 0,
            isSquatting: false
        };

        // Obstacles
        let obstacles = [];

        // Particles
        let particles = [];

        // Visual effects
        let screenShake = { x: 0, y: 0, intensity: 0 };
        let flashIntensity = 0;
        let flashColor = '#ffffff';
        let chromaticOffset = 0;
        let gridPulse = 0;
        let beatPulse = 0;

        // Initialize audio
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = isMuted ? 0 : 0.5;
        }

        // Sound synthesis
        function playKick() {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playHiHat() {
            if (!audioCtx || isMuted) return;
            const bufferSize = audioCtx.sampleRate * 0.05;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
            }
            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 7000;
            source.buffer = buffer;
            gain.gain.value = 0.12;
            source.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            source.start();
        }

        function playBass(note = 0) {
            if (!audioCtx || isMuted || multiplier < 2) return;
            const freq = 55 * Math.pow(2, note / 12);
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playSynth() {
            if (!audioCtx || isMuted || multiplier < 3) return;
            const notes = [0, 3, 7, 12];
            const baseFreq = 220;
            notes.forEach((note, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = baseFreq * Math.pow(2, note / 12);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }, i * 50);
            });
        }

        function playJump() {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        function playDoubleJump() {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playPerfect() {
            if (!audioCtx || isMuted) return;
            [800, 1000, 1200].forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }, i * 30);
            });
        }

        function playGood() {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playMiss() {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 80;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playComboUp() {
            if (!audioCtx || isMuted) return;
            [400, 500, 600, 800].forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                }, i * 50);
            });
        }

        // Particle system
        function createParticles(x, y, color, count = 10, spread = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * spread * 2,
                    vy: (Math.random() - 0.5) * spread * 2 - 3,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.02,
                    size: 3 + Math.random() * 5,
                    color: color
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life -= p.decay;
                return p.life > 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // Game functions
        function jump() {
            if (player.onGround) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
                player.hasDoubleJumped = false;
                player.targetRotation = player.rotation + Math.PI * 2; // Full spin
                player.squash = 0.6;
                player.stretch = 1.4;
                playJump();
                checkBeatTiming();
                createParticles(player.x, player.y + player.height, COLORS.magenta, 6, 3);
            } else if (!player.hasDoubleJumped) {
                player.vy = DOUBLE_JUMP_FORCE;
                player.hasDoubleJumped = true;
                player.targetRotation += Math.PI * 1.5; // Extra spin
                player.squash = 0.7;
                player.stretch = 1.3;
                playDoubleJump();
                createParticles(player.x, player.y + player.height / 2, COLORS.cyan, 10, 5);
            }
        }

        function checkBeatTiming() {
            const nearestObstacle = obstacles.find(o =>
                !o.cleared &&
                Math.abs(o.x + o.width / 2 - HIT_ZONE_X) < 120
            );

            if (!nearestObstacle) return;

            const distanceToHitZone = (nearestObstacle.x + nearestObstacle.width / 2) - HIT_ZONE_X;
            const timeToHitZone = Math.abs((distanceToHitZone / speed) * (1000 / 60));

            if (timeToHitZone <= PERFECT_WINDOW) {
                handlePerfect(nearestObstacle);
            } else if (timeToHitZone <= GOOD_WINDOW) {
                handleGood(nearestObstacle);
            }
        }

        function handlePerfect(obstacle) {
            obstacle.cleared = true;
            perfectCount++;
            combo++;
            bestCombo = Math.max(bestCombo, combo);
            updateMultiplier();
            const points = 100 * multiplier;
            score += points;

            flashIntensity = 0.4;
            flashColor = COLORS.gold;
            createParticles(obstacle.x + obstacle.width / 2, obstacle.y + obstacle.height / 2, COLORS.gold, 25, 10);
            playPerfect();

            showFeedback('PERFECT!', 'perfect');
        }

        function handleGood(obstacle) {
            obstacle.cleared = true;
            goodCount++;
            combo++;
            bestCombo = Math.max(bestCombo, combo);
            updateMultiplier();
            const points = 50 * multiplier;
            score += points;

            flashIntensity = 0.2;
            flashColor = COLORS.cyan;
            createParticles(obstacle.x + obstacle.width / 2, obstacle.y + obstacle.height / 2, COLORS.cyan, 15, 6);
            playGood();

            showFeedback('GOOD', 'good');
        }

        function handleMiss(obstacle) {
            obstacle.cleared = true;
            missCount++;
            combo = 0;
            multiplier = 1;
            health--;

            screenShake.intensity = 20;
            flashIntensity = 0.5;
            flashColor = COLORS.red;
            playMiss();

            showFeedback('MISS', 'miss');

            if (health <= 0) {
                gameOver();
            }

            updateHUD();
        }

        function updateMultiplier() {
            const oldMultiplier = multiplier;
            if (combo >= 20) multiplier = 4;
            else if (combo >= 12) multiplier = 3;
            else if (combo >= 5) multiplier = 2;
            else multiplier = 1;

            if (multiplier > oldMultiplier) {
                playComboUp();
                chromaticOffset = 8;
            }
        }

        function showFeedback(text, className) {
            const feedback = document.getElementById('timingFeedback');
            feedback.textContent = text;
            feedback.className = className;
            feedback.style.opacity = '1';
            feedback.style.transform = 'translate(-50%, -50%) scale(1.3)';

            setTimeout(() => {
                feedback.style.opacity = '0';
                feedback.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 250);
        }

        function spawnObstacle(type = 'ground') {
            const groundY = canvas.height - GROUND_HEIGHT;
            const spawnX = canvas.width + 50;

            // Check minimum spacing against rightmost obstacle's CURRENT position
            if (obstacles.length > 0) {
                const rightmost = obstacles.reduce((max, o) => o.x > max.x ? o : max, obstacles[0]);
                if (spawnX - rightmost.x < MIN_OBSTACLE_SPACING) {
                    return;
                }
            }

            let obstacle;

            if (type === 'air') {
                // First spawn a ground spike to force the player into the air
                const leadSpike = {
                    x: spawnX,
                    y: groundY - 50,
                    width: 35,
                    height: 50,
                    type: 'ground',
                    cleared: false,
                    pulse: 0
                };
                obstacles.push(leadSpike);

                // Then spawn the air obstacle close after it
                obstacle = {
                    x: spawnX + 100, // Close enough to hit while still airborne
                    y: groundY - 155, // High up - must double jump to clear
                    width: 50,
                    height: 35,
                    type: 'air',
                    cleared: false,
                    pulse: 0
                };
            } else if (type === 'offbeat') {
                // Off-beat ground spike
                obstacle = {
                    x: spawnX,
                    y: groundY - 45,
                    width: 30,
                    height: 45,
                    type: 'offbeat',
                    cleared: false,
                    pulse: 0
                };
            } else {
                // Normal ground spike
                obstacle = {
                    x: spawnX,
                    y: groundY - 50,
                    width: 35,
                    height: 50,
                    type: 'ground',
                    cleared: false,
                    pulse: 0
                };
            }

            obstacles.push(obstacle);
        }

        function updateObstacles() {
            const groundY = canvas.height - GROUND_HEIGHT;

            obstacles = obstacles.filter(o => {
                o.x -= speed;
                o.pulse = Math.max(0, o.pulse - 0.05);

                // Bob animation for air obstacles
                // Collision detection
                if (!o.cleared) {
                    const playerCenterX = player.x;
                    const playerCenterY = player.y + player.height / 2;
                    const playerRadius = player.width * 0.35;

                    let obstacleLeft, obstacleRight, obstacleTop, obstacleBottom;

                    obstacleLeft = o.x;
                    obstacleRight = o.x + o.width;
                    obstacleTop = o.y;
                    obstacleBottom = o.y + o.height;

                    // Simple circle-rect collision
                    const closestX = Math.max(obstacleLeft, Math.min(playerCenterX, obstacleRight));
                    const closestY = Math.max(obstacleTop, Math.min(playerCenterY, obstacleBottom));
                    const distX = playerCenterX - closestX;
                    const distY = playerCenterY - closestY;
                    const distance = Math.sqrt(distX * distX + distY * distY);

                    if (distance < playerRadius) {
                        handleMiss(o);
                    }

                    // Check if passed without clearing
                    if (o.x + o.width < player.x - 40) {
                        // For air obstacles, only miss if player didn't go high enough
                        if (o.type === 'air') {
                            // They passed under it, that's fine for air obstacles
                            // unless they were supposed to go through it
                            // Actually, air obstacles you MUST double jump over
                            // If they passed and didn't clear it, they went under = miss
                            handleMiss(o);
                        } else {
                            handleMiss(o);
                        }
                    }
                }

                return o.x > -100;
            });
        }

        function updatePlayer(deltaTime) {
            // Gravity
            player.vy += GRAVITY;
            player.y += player.vy;

            // Ground collision
            const groundY = canvas.height - GROUND_HEIGHT - player.height;
            if (player.y >= groundY) {
                player.y = groundY;
                player.vy = 0;
                if (!player.onGround) {
                    player.squash = 1.4;
                    player.stretch = 0.7;
                    createParticles(player.x, player.y + player.height, COLORS.magenta, 5, 2);
                    // Snap rotation to nearest full rotation
                    player.rotation = Math.round(player.rotation / (Math.PI * 2)) * Math.PI * 2;
                    player.targetRotation = player.rotation;
                }
                player.onGround = true;
            }

            // Rotation animation (spin while jumping)
            if (!player.onGround) {
                const rotationSpeed = 0.15;
                player.rotation += (player.targetRotation - player.rotation) * rotationSpeed;
            }

            // Squash/stretch recovery
            player.squash += (1 - player.squash) * 0.15;
            player.stretch += (1 - player.stretch) * 0.15;

            // Trail
            player.trail.unshift({ x: player.x, y: player.y + player.height / 2, rotation: player.rotation });
            if (player.trail.length > 10) player.trail.pop();
        }

        function updateBeat() {
            const timeSinceLastBeat = gameTime - lastBeatTime;

            if (timeSinceLastBeat >= BEAT_INTERVAL) {
                lastBeatTime = gameTime;
                beatCount++;
                gridPulse = 1;
                beatPulse = 1;

                // Play beat sounds
                playKick();
                if (beatCount % 2 === 0) playHiHat();

                // Bass line
                if (beatCount % 4 === 0) {
                    const bassNotes = [0, 0, 3, 5];
                    playBass(bassNotes[Math.floor(beatCount / 4) % 4]);
                }

                // Synth
                if (beatCount % 8 === 0) playSynth();

                // Pattern-based obstacle spawning
                const pattern = PATTERNS[currentPattern];
                const patternIndex = patternBeat % pattern.length;

                if (pattern[patternIndex] === 1) {
                    // Determine obstacle type based on game time
                    const rand = Math.random();
                    if (gameTime > 25000 && rand < 0.25) {
                        spawnObstacle('air');
                    } else {
                        spawnObstacle('ground');
                    }
                }

                patternBeat++;

                // Change pattern every 16 beats for variety
                if (patternBeat % 16 === 0) {
                    currentPattern = Math.floor(Math.random() * PATTERNS.length);
                }

                // Pulse obstacles
                obstacles.forEach(o => o.pulse = 1);
            }

            // Off-beat spawning (between beats) for variety
            const halfBeatTime = BEAT_INTERVAL / 2;
            if (timeSinceLastBeat >= halfBeatTime - 20 && timeSinceLastBeat <= halfBeatTime + 20) {
                if (gameTime > 15000 && Math.random() < 0.15 && beatCount % 4 === 2) {
                    spawnObstacle('offbeat');
                }
            }

            gridPulse *= 0.9;
            beatPulse *= 0.85;
        }

        function updateEffects() {
            if (screenShake.intensity > 0) {
                screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.intensity *= 0.85;
            }

            flashIntensity *= 0.8;
            chromaticOffset *= 0.9;

            // Speed increase
            speed = BASE_SPEED + (gameTime / 50000) * 2.5;
            speed = Math.min(speed, BASE_SPEED * 1.7);
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = multiplier + 'x';
            document.getElementById('combo').className = 'hud-item multiplier-' + multiplier;

            const hearts = document.querySelectorAll('.heart');
            hearts.forEach((heart, i) => {
                heart.classList.toggle('empty', i >= health);
            });
        }

        // Drawing functions
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#0a0a12');
            gradient.addColorStop(1, '#0a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Beat pulse effect
            if (beatPulse > 0.1) {
                ctx.fillStyle = `rgba(255, 0, 255, ${beatPulse * 0.06})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73 + gameTime * 0.02) % canvas.width;
                const y = (i * 37) % (canvas.height * 0.5);
                const size = 1 + (i % 3);
                ctx.globalAlpha = 0.3 + Math.sin(gameTime * 0.002 + i) * 0.2;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;
        }

        function drawGrid() {
            const groundY = canvas.height - GROUND_HEIGHT;
            const horizonY = canvas.height * 0.4;

            // Vertical lines
            for (let i = -20; i <= 20; i++) {
                const x1 = canvas.width * 0.5 + i * 100 - (gameTime * speed * 0.1) % 100;
                const x2 = canvas.width * 0.5 + i * 30;

                ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + gridPulse * 0.3})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x1, groundY);
                ctx.lineTo(x2, horizonY);
                ctx.stroke();
            }

            // Horizontal lines
            for (let i = 0; i < 15; i++) {
                const t = i / 15;
                const y = horizonY + (groundY - horizonY) * Math.pow(t, 1.5);
                ctx.strokeStyle = `rgba(255, 0, 255, ${0.1 + t * 0.2 + gridPulse * 0.15})`;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Ground line
            ctx.strokeStyle = COLORS.magenta;
            ctx.lineWidth = 3;
            ctx.shadowColor = COLORS.magenta;
            ctx.shadowBlur = 10 + gridPulse * 25;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y + player.height / 2);

            // Apply squash/stretch
            ctx.scale(player.stretch, player.squash);

            // Apply rotation
            ctx.rotate(player.rotation);

            // Trail
            ctx.globalAlpha = 0.2;
            player.trail.forEach((point, i) => {
                const alpha = (1 - i / player.trail.length) * 0.2;
                const size = (1 - i / player.trail.length) * 8;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = COLORS.magenta;

                ctx.save();
                ctx.translate(point.x - player.x, point.y - player.y - player.height / 2);
                ctx.rotate(point.rotation);
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            ctx.globalAlpha = 1;

            // Player color based on multiplier
            const colors = [COLORS.cyan, COLORS.green, COLORS.yellow, COLORS.magenta];
            const playerColor = colors[multiplier - 1];

            ctx.fillStyle = playerColor;
            ctx.shadowColor = playerColor;
            ctx.shadowBlur = 15 + combo * 2;

            // Diamond shape
            const h = player.height / 2;
            const w = player.width / 2;
            ctx.beginPath();
            ctx.moveTo(0, -h);
            ctx.lineTo(w, 0);
            ctx.lineTo(0, h);
            ctx.lineTo(-w, 0);
            ctx.closePath();
            ctx.fill();

            // Inner glow
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.moveTo(0, -h * 0.5);
            ctx.lineTo(w * 0.5, 0);
            ctx.lineTo(0, h * 0.5);
            ctx.lineTo(-w * 0.5, 0);
            ctx.closePath();
            ctx.fill();

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            ctx.restore();

            // Double jump indicator (outside rotation)
            if (!player.onGround && !player.hasDoubleJumped) {
                ctx.globalAlpha = 0.4 + Math.sin(gameTime * 0.015) * 0.3;
                ctx.strokeStyle = COLORS.cyan;
                ctx.lineWidth = 2;
                ctx.shadowColor = COLORS.cyan;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(player.x, player.y + player.height / 2, player.width * 0.7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        function drawObstacles() {
            const groundY = canvas.height - GROUND_HEIGHT;

            obstacles.forEach(o => {
                const pulse = o.pulse;
                const glowSize = 10 + pulse * 20;

                ctx.shadowBlur = glowSize;

                if (o.type === 'air') {
                    // Floating cyan diamond - requires double jump
                    const centerX = o.x + o.width / 2;
                    const centerY = o.y + o.height / 2;

                    // Timing ring - contracts as obstacle approaches player
                    const distToPlayer = o.x - player.x;
                    if (distToPlayer > 0 && distToPlayer < 250 && !o.cleared) {
                        const progress = 1 - (distToPlayer / 250); // 0 to 1 as it approaches
                        const ringRadius = 60 - progress * 35; // Shrinks from 60 to 25

                        // Ring color shifts to gold when in timing window
                        const inWindow = distToPlayer < 80;
                        ctx.strokeStyle = inWindow ? COLORS.gold : COLORS.cyan;
                        ctx.lineWidth = inWindow ? 4 : 2;
                        ctx.globalAlpha = 0.5 + progress * 0.5;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }

                    ctx.fillStyle = COLORS.cyan;
                    ctx.shadowColor = COLORS.cyan;

                    // Diamond shape
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY - o.height / 2);
                    ctx.lineTo(centerX + o.width / 2, centerY);
                    ctx.lineTo(centerX, centerY + o.height / 2);
                    ctx.lineTo(centerX - o.width / 2, centerY);
                    ctx.closePath();
                    ctx.fill();

                } else if (o.type === 'offbeat') {
                    // Orange off-beat spike
                    ctx.fillStyle = COLORS.orange;
                    ctx.shadowColor = COLORS.orange;

                    ctx.beginPath();
                    ctx.moveTo(o.x + o.width / 2, o.y);
                    ctx.lineTo(o.x + o.width, o.y + o.height);
                    ctx.lineTo(o.x, o.y + o.height);
                    ctx.closePath();
                    ctx.fill();

                } else {
                    // Normal red spike
                    ctx.fillStyle = COLORS.red;
                    ctx.shadowColor = COLORS.red;

                    ctx.beginPath();
                    ctx.moveTo(o.x + o.width / 2, o.y);
                    ctx.lineTo(o.x + o.width, o.y + o.height);
                    ctx.lineTo(o.x, o.y + o.height);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.shadowBlur = 0;
            });
        }

        function drawEffects() {
            if (flashIntensity > 0.01) {
                const r = parseInt(flashColor.slice(1, 3), 16);
                const g = parseInt(flashColor.slice(3, 5), 16);
                const b = parseInt(flashColor.slice(5, 7), 16);
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${flashIntensity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function draw() {
            ctx.save();
            ctx.translate(screenShake.x, screenShake.y);

            if (chromaticOffset > 0.5) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = 0.2;
                ctx.translate(-chromaticOffset, 0);
                drawScene();
                ctx.translate(chromaticOffset * 2, 0);
                drawScene();
                ctx.restore();
            }

            drawScene();
            drawEffects();

            ctx.restore();
        }

        function drawScene() {
            drawBackground();
            drawGrid();
            drawObstacles();
            drawPlayer();
            drawParticles();
        }

        function update(deltaTime) {
            if (gameState !== 'playing') return;

            gameTime += deltaTime;

            updateBeat();
            updatePlayer(deltaTime);
            updateObstacles();
            updateParticles();
            updateEffects();
            updateHUD();
        }

        function startGame() {
            initAudio();

            gameState = 'playing';
            score = 0;
            combo = 0;
            multiplier = 1;
            bestCombo = 0;
            health = 3;
            gameTime = 0;
            lastBeatTime = 0;
            beatCount = 0;
            speed = BASE_SPEED;
            perfectCount = 0;
            goodCount = 0;
            missCount = 0;
            currentPattern = 0;
            patternBeat = 0;

            player.y = canvas.height - GROUND_HEIGHT - player.height;
            player.vy = 0;
            player.onGround = true;
            player.hasDoubleJumped = false;
            player.rotation = 0;
            player.targetRotation = 0;
            player.squash = 1;
            player.stretch = 1;
            player.trail = [];

            obstacles = [];
            particles = [];

            document.getElementById('overlay').classList.add('hidden');
            updateHUD();
        }

        function gameOver() {
            gameState = 'gameover';

            const highScore = parseInt(localStorage.getItem('neonPulseHighScore') || '0');
            if (score > highScore) {
                localStorage.setItem('neonPulseHighScore', score);
            }

            const totalObstacles = perfectCount + goodCount + missCount;
            const accuracy = totalObstacles > 0 ? ((perfectCount + goodCount) / totalObstacles) * 100 : 0;

            let grade, gradeClass;
            if (accuracy >= 95) { grade = 'S'; gradeClass = 'grade-s'; }
            else if (accuracy >= 80) { grade = 'A'; gradeClass = 'grade-a'; }
            else if (accuracy >= 60) { grade = 'B'; gradeClass = 'grade-b'; }
            else { grade = 'C'; gradeClass = 'grade-c'; }

            const overlay = document.getElementById('overlay');
            const statsDiv = document.getElementById('gameOverStats');
            const titleDiv = document.getElementById('title');
            const subtitleDiv = document.getElementById('subtitle');

            titleDiv.style.display = 'none';
            subtitleDiv.style.display = 'none';

            statsDiv.innerHTML = `
                <h2>GAME OVER</h2>
                <p class="grade ${gradeClass}">${grade}</p>
                <p>SCORE: ${score}</p>
                <p>BEST COMBO: ${bestCombo}x</p>
                <p>PERFECT: ${perfectCount} | GOOD: ${goodCount} | MISS: ${missCount}</p>
                <p>ACCURACY: ${accuracy.toFixed(1)}%</p>
            `;
            statsDiv.style.display = 'block';

            document.getElementById('highScore').textContent = `HIGH SCORE: ${Math.max(score, highScore)}`;
            document.getElementById('startPrompt').textContent = 'PRESS SPACE TO RETRY';

            overlay.classList.remove('hidden');
        }

        function showTitle() {
            gameState = 'title';

            const overlay = document.getElementById('overlay');
            const statsDiv = document.getElementById('gameOverStats');
            const titleDiv = document.getElementById('title');
            const subtitleDiv = document.getElementById('subtitle');

            titleDiv.style.display = 'block';
            subtitleDiv.style.display = 'block';
            statsDiv.style.display = 'none';

            document.getElementById('startPrompt').textContent = 'PRESS SPACE TO START';

            const highScore = localStorage.getItem('neonPulseHighScore') || '0';
            document.getElementById('highScore').textContent = `HIGH SCORE: ${highScore}`;

            overlay.classList.remove('hidden');
        }

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'title' || gameState === 'gameover') {
                    startGame();
                } else if (gameState === 'playing') {
                    jump();
                }
            }

            if (e.code === 'KeyM') {
                isMuted = !isMuted;
                if (masterGain) masterGain.gain.value = isMuted ? 0 : 0.5;
                document.getElementById('muteBtn').textContent = isMuted ? 'MUTED' : 'SOUND';
            }
        });

        document.getElementById('muteBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            if (masterGain) masterGain.gain.value = isMuted ? 0 : 0.5;
            document.getElementById('muteBtn').textContent = isMuted ? 'MUTED' : 'SOUND';
        });

        canvas.addEventListener('mousedown', () => {
            if (gameState === 'title' || gameState === 'gameover') {
                startGame();
            } else if (gameState === 'playing') {
                jump();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'title' || gameState === 'gameover') {
                startGame();
            } else if (gameState === 'playing') {
                jump();
            }
        });

        // Game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            const deltaTime = lastTime ? timestamp - lastTime : 16.67;
            lastTime = timestamp;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Initialize
        showTitle();
        player.y = canvas.height - GROUND_HEIGHT - player.height;
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
